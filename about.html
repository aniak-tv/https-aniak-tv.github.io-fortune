<style>
:root{
  --ink:#0a0912; --ink-2:#12101e; --ink-3:#1a1730;
  --paper:#efeae0; --paper-dim:rgba(239,234,224,.62); --paper-faint:rgba(239,234,224,.38);
  --line:rgba(239,234,224,.12);
  --cheong:#57d9d4; --jeok:#ff4d5e; --hwang:#f5b83d; --violet:#9d7bff;
  --water:#5ea8ff; --wood:#4ade80;
  --glow-gold:0 0 18px rgba(245,184,61,.35);
  --glow-red:0 0 18px rgba(255,77,94,.35);
  --glow-cyan:0 0 18px rgba(87,217,212,.30);
  --glow-violet:0 0 18px rgba(157,123,255,.33);
  --display:'Marcellus','Noto Serif KR','Noto Serif JP',serif;
  --body:'Spectral','Noto Serif KR','Noto Serif JP',serif;
  --kr:'Noto Serif KR','Noto Serif JP',serif;
  --mono:'IBM Plex Mono','Noto Serif KR','Noto Serif JP',monospace;
}
html[lang="ja"]{--body:'Spectral','Noto Serif JP',serif;--kr:'Noto Serif JP',serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--paper);font-family:var(--body);font-weight:300;line-height:1.75;font-size:17px;overflow-x:hidden}
::selection{background:var(--hwang);color:var(--ink)}
img,svg{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
:focus-visible{outline:2px solid var(--hwang);outline-offset:3px;border-radius:2px}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:#2a2542;border-radius:5px;border:2px solid var(--ink)}
.wrap{max-width:1140px;margin:0 auto;padding:0 24px}

body::before{content:"";position:fixed;inset:0;z-index:-3;background:
  radial-gradient(1px 1px at 12% 18%,rgba(239,234,224,.55),transparent 50%),
  radial-gradient(1px 1px at 78% 9%,rgba(239,234,224,.4),transparent 50%),
  radial-gradient(1.6px 1.6px at 64% 64%,rgba(157,123,255,.55),transparent 50%),
  radial-gradient(1px 1px at 31% 82%,rgba(87,217,212,.5),transparent 50%),
  radial-gradient(1px 1px at 89% 47%,rgba(239,234,224,.4),transparent 50%)}
.aurora{position:fixed;inset:-25%;z-index:-2;filter:blur(90px);opacity:.45;pointer-events:none}
.aurora i{position:absolute;border-radius:50%}
.aurora i:nth-child(1){width:46vw;height:46vw;left:-8%;top:-6%;background:rgba(157,123,255,.12);animation:fl1 30s ease-in-out infinite alternate}
.aurora i:nth-child(2){width:38vw;height:38vw;right:-6%;top:18%;background:rgba(87,217,212,.08);animation:fl2 36s ease-in-out infinite alternate}
.aurora i:nth-child(3){width:42vw;height:42vw;left:24%;bottom:-14%;background:rgba(245,184,61,.06);animation:fl3 42s ease-in-out infinite alternate}
@keyframes fl1{to{transform:translate(10vw,8vh) scale(1.15)}}
@keyframes fl2{to{transform:translate(-8vw,12vh) scale(.9)}}
@keyframes fl3{to{transform:translate(6vw,-9vh) scale(1.1)}}
.grain{position:fixed;inset:0;z-index:70;pointer-events:none;opacity:.05;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/></filter><rect width="160" height="160" filter="url(%23n)" opacity="0.6"/></svg>')}
.obang{position:fixed;top:0;left:0;right:0;height:2px;z-index:80;
  background:linear-gradient(90deg,var(--water),var(--jeok),var(--hwang),var(--paper),var(--cheong));opacity:.85}

header{position:sticky;top:0;z-index:50;background:rgba(10,9,18,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}

.brand .latin{font-family:var(--display);letter-spacing:.34em;font-size:1rem}
.brand-sub{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;color:rgba(87,217,212,.65);align-self:center;white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:14px}

.back-link:hover{color:var(--cheong)}

/* page hero */

.page-hero .wm{position:absolute;right:-2%;top:-10%;font-family:var(--kr);font-weight:600;font-size:min(40vw,480px);line-height:1;color:rgba(239,234,224,.025);z-index:-1;user-select:none;pointer-events:none}
.eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:var(--hwang);display:flex;align-items:center;gap:1em;margin-bottom:1.2em}
.eyebrow .kr{font-family:var(--kr);letter-spacing:.4em;font-weight:600;text-shadow:var(--glow-gold)}
.eyebrow::before{content:"✦";font-size:.8em;color:var(--hwang)}
.eyebrow::after{content:"";height:1px;width:64px;background:linear-gradient(90deg,var(--hwang),transparent)}
h1{font-family:var(--display);font-weight:400;font-size:clamp(2rem,4.5vw,3.2rem);line-height:1.18;margin-bottom:.5em}
h1 em{font-style:normal;background:linear-gradient(100deg,var(--cheong),var(--violet) 70%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 16px rgba(87,217,212,.3))}
.hero-lede{color:var(--paper-dim);max-width:58ch;font-size:1.05rem}
.btn{display:inline-flex;align-items:center;gap:.6em;font-family:var(--mono);font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;
  padding:1em 1.8em;color:var(--hwang);position:relative;overflow:hidden;transition:.3s;
  border:1px solid transparent;
  background:linear-gradient(var(--ink),var(--ink)) padding-box,
             linear-gradient(120deg,var(--hwang),rgba(255,77,94,.75),var(--hwang)) border-box}
.btn::after{content:"";position:absolute;inset:0;background:linear-gradient(105deg,transparent 42%,rgba(255,255,255,.16) 50%,transparent 58%);transform:translateX(-120%);transition:transform .65s ease}
.btn:hover{box-shadow:var(--glow-gold);text-shadow:var(--glow-gold)}
.btn:hover::after{transform:translateX(120%)}
.cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:2em}

/* reading cards */
.readings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:64px 0 72px}
@media(max-width:700px){.readings-grid{grid-template-columns:1fr}}
.rcard{border:1px solid var(--line);padding:36px 32px;background:linear-gradient(160deg,var(--ink-2),var(--ink) 70%);position:relative;overflow:hidden;transition:.3s}
.rcard::before,.rcard::after{content:"";position:absolute;width:20px;height:20px;transition:.35s;border-color:var(--c,var(--hwang));border-style:solid;opacity:.45}
.rcard::before{top:10px;left:10px;border-width:1px 0 0 1px}
.rcard::after{bottom:10px;right:10px;border-width:0 1px 1px 0}
.rcard:hover{border-color:var(--c,var(--hwang));box-shadow:0 0 28px color-mix(in srgb,var(--c,var(--hwang)) 18%,transparent);transform:translateY(-3px)}
.rcard:hover::before,.rcard:hover::after{opacity:1;width:28px;height:28px}
.rcard .glyph{font-family:var(--kr);font-weight:600;font-size:2.8rem;color:var(--c,var(--hwang));line-height:1;margin-bottom:18px;text-shadow:0 0 20px color-mix(in srgb,var(--c,var(--hwang)) 50%,transparent)}
.rcard .tag{font-family:var(--mono);font-size:.63rem;letter-spacing:.24em;text-transform:uppercase;color:var(--c,var(--hwang));margin-bottom:.6em}
.rcard h3{font-family:var(--display);font-size:1.35rem;font-weight:400;margin-bottom:.4em}
.rcard h3 .sub{font-family:var(--kr);color:var(--paper-faint);font-size:.82em;margin-left:.4em}
.rcard p{color:var(--paper-dim);font-size:.94rem;line-height:1.85}
.rcard.c-gold{--c:var(--hwang)}.rcard.c-red{--c:var(--jeok)}.rcard.c-violet{--c:var(--violet)}.rcard.c-cyan{--c:var(--cheong)}

/* divider */
.divider{display:flex;align-items:center;gap:18px;max-width:1140px;margin:0 auto;padding:0 24px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line))}
.divider::after{background:linear-gradient(90deg,var(--line),transparent)}
.divider span{font-family:var(--kr);color:rgba(245,184,61,.5);font-size:.85rem;letter-spacing:.5em;text-shadow:var(--glow-gold)}

/* prose sections */
section{padding:72px 0}
section:first-of-type{padding-top:0}
.sec-inner{max-width:860px}
h2{font-family:var(--display);font-weight:400;font-size:clamp(1.6rem,3vw,2.2rem);margin:.3em 0 .6em}
h2 .kr{font-family:var(--kr);color:var(--hwang);font-weight:400;font-size:.78em;margin-left:.5em;text-shadow:var(--glow-gold)}
.lede{color:var(--paper-dim);line-height:1.9;font-size:.98rem;max-width:66ch}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:36px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.two-col p{color:var(--paper-dim);font-size:.96rem;line-height:1.88}
.two-col h4{font-family:var(--mono);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--hwang);margin-bottom:.8em;text-shadow:var(--glow-gold)}

/* five elements strip */
.fiveel{display:flex;gap:14px;margin-top:28px;flex-wrap:wrap}
.fiveel span{font-family:var(--kr);font-weight:600;width:52px;height:52px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:.3s}
.fiveel span:hover{transform:translateY(-3px);border-color:currentColor}
.el-wood{color:#4ade80}.el-fire{color:#ff4d5e}.el-earth{color:#f5b83d}.el-metal{color:#efeae0}.el-water{color:#5ea8ff}

/* contact box */
.contact-box{border:1px solid rgba(87,217,212,.4);outline:1px solid rgba(87,217,212,.12);outline-offset:7px;padding:40px 44px;max-width:640px;margin-top:36px;background:linear-gradient(170deg,rgba(87,217,212,.05),transparent);box-shadow:var(--glow-cyan)}
.contact-box h3{font-family:var(--display);font-weight:400;font-size:1.25rem;color:var(--cheong);margin-bottom:.6em;text-shadow:var(--glow-cyan)}
.contact-box p{color:var(--paper-dim);font-size:.96rem;line-height:1.88}
.contact-box a{color:var(--cheong);border-bottom:1px solid rgba(87,217,212,.35);transition:.2s}
.contact-box a:hover{border-bottom-color:var(--cheong)}

/* disclaimer block */
.disclaimer-block{border-left:2px solid rgba(245,184,61,.55);padding:14px 0 14px 24px;margin-top:32px;max-width:62ch}
.disclaimer-block p{color:var(--paper-dim);font-size:.92rem;line-height:1.85;font-style:italic}
html[lang="ko"] .disclaimer-block p,html[lang="ja"] .disclaimer-block p{font-style:normal}

footer{border-top:1px solid var(--line);padding:50px 0 58px;color:var(--paper-faint);font-size:.85rem;position:relative;z-index:1}
footer::before{content:"";position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--hwang),transparent);opacity:.5}
footer .wrap{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;align-items:flex-start}
.footer-links{display:flex;gap:2em;font-family:var(--mono);font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--paper-faint);flex-wrap:wrap}
.footer-links a:hover{color:var(--cheong)}
.footer-disc{max-width:54ch;font-size:.8rem;line-height:1.8;margin-top:12px}
</style>
</head>

<script>
const I18N = {
en: {
  back: 'Back to readings',
  eyebrowKr: '소개',
  eyebrow: 'About this site',
  title: 'Five centuries of fate, <em>now in your pocket.</em>',

  readEyebrowKr: '사주',
  readEyebrow: 'The four oracles',
  readTitle: 'What we offer',
  readLede: 'Each tradition answers a different question. Together they cover the map.',
  readings: [
    { glyph:'福', tag:'Korea · Joseon dynasty · yearly oracle', title:'Tojeong Bigyeol', sub:'토정비결',
      body:'Attributed to <strong>Yi Ji-ham</strong> (1517–1578), a Joseon scholar who chose to live in a mud hut by the sea and spend his wealth on the poor, Tojeong Bigyeol turns your lunar birth date into one of 144 hexagram verses. Each verse carries a poetic forecast for the year — covering wealth, love, health, and the rhythm of the four seasons. To this day, millions of Korean families consult it in the first days of the Lunar New Year. We quietly convert the solar birth date you enter into its lunar equivalent before casting your reading.', c:'c-gold' },
    { glyph:'命', tag:'Korea · Four pillars · eight characters', title:'Saju Palja', sub:'사주팔자',
      body:'"Four pillars, eight characters." The year, month, day and hour of your birth are each expressed as a heavenly stem and an earthly branch — two characters per pillar, eight in total. These eight characters map your balance of the <strong>five elements</strong> (wood, fire, earth, metal, water) and their yin-yang polarity. In Korea, a Saju reading still precedes major life decisions: weddings, career changes, baby names. The day stem is traditionally considered the <em>self</em> — who you are at your core — while the surrounding characters describe your environment, relationships and luck.', c:'c-red' },
    { glyph:'卜', tag:'Western · Major arcana · three-card spread', title:'Tarot',  sub:'타로',

let LANG = localStorage.getItem('unse-lang') || 'en';

function applyLang(lang) {
  LANG = lang;
  localStorage.setItem('unse-lang', lang);
  document.documentElement.lang = lang;
  const L = I18N[lang];

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (L[key] !== undefined) el.textContent = L[key];
  });
  document.querySelectorAll('.langs button').forEach(b => {
    b.classList.toggle('on', b.dataset.lang === lang);
  });

  // h1 with em tag
  document.querySelector('h1').innerHTML = L.title;

  // contactBody contains an <a> tag — must use innerHTML
  const contactBodyEl = document.querySelector('[data-i18n="contactBody"]');
  if (contactBodyEl && L.contactBody) contactBodyEl.innerHTML = L.contactBody;

  // Readings grid
  document.getElementById('readings-grid').innerHTML = L.readings.map(r => `
    <div class="rcard ${r.c}">
      <div class="glyph">${r.glyph}</div>
      <p class="tag">${r.tag}</p>
      <h3>${r.title}<span class="sub">${r.sub}</span></h3>
      <p>${r.body}</p>
    </div>`).join('');

  // Cultural columns
  document.getElementById('cult-cols').innerHTML = L.cultCols.map(c => `
    <div><h4>${c.h}</h4><p>${c.p}</p></div>`).join('');
}

document.querySelectorAll('.langs button').forEach(b => {
  b.addEventListener('click', () => applyLang(b.dataset.lang));
});

applyLang(LANG);
</script>
